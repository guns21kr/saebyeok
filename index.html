<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>새벽 — 조명건</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e0e;
      --bg2: #161616;
      --bg3: #1e1e1e;
      --border: #2a2a2a;
      --text: #d4cfc8;
      --text-dim: #7a7570;
      --text-bright: #ece8e1;
      --accent: #b8956a;
      --accent-dim: #7a6245;
      --locked: #3a3a3a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Serif KR', serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── 헤더 ── */
    header {
      position: relative;
      padding: 72px 24px 56px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
    }

    /* 배경 캔버스 */
    #headerCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* 황금빛 새벽 그라디언트 — 캔버스 위에 덧씌움 */
    header::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 50% 0%, rgba(184,149,106,0.07) 0%, transparent 65%),
        radial-gradient(ellipse 40% 30% at 50% 100%, rgba(120,90,50,0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    /* 헤더 내 텍스트는 캔버스 위에 */
    header > *:not(#headerCanvas) {
      position: relative;
      z-index: 1;
    }

    .book-label {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.3em;
      color: var(--accent-dim);
      text-transform: uppercase;
      margin-bottom: 28px;
      animation: textReveal 1.4s 0.2s ease both;
    }

    .book-title {
      font-size: clamp(52px, 14vw, 88px);
      font-weight: 300;
      letter-spacing: -0.02em;
      color: var(--text-bright);
      line-height: 1;
      margin-bottom: 20px;
      animation: titleReveal 2s 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .book-subtitle {
      font-size: 13px;
      font-weight: 300;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      margin-bottom: 40px;
      animation: textReveal 1.4s 1.1s ease both;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--accent-dim);
      margin: 0 auto 28px;
      opacity: 0;
      animation: dividerReveal 1.2s 1.4s ease forwards;
    }

    .book-desc {
      max-width: 320px;
      margin: 0 auto 32px;
      font-size: 14px;
      font-weight: 300;
      line-height: 1.9;
      color: var(--text-dim);
      word-break: keep-all;
      animation: textReveal 1.4s 1.6s ease both;
    }

    .author-line {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px;
      font-weight: 300;
      color: var(--accent-dim);
      letter-spacing: 0.15em;
      animation: textReveal 1.4s 1.9s ease both;
    }

    /* ── 헤더 애니메이션 키프레임 ── */

    /* 제목: 어둠 속에서 서서히 드러나는 빛처럼 */
    @keyframes titleReveal {
      0%   { opacity: 0; filter: blur(12px); transform: translateY(6px); }
      40%  { opacity: 0.3; filter: blur(4px); }
      100% { opacity: 1; filter: blur(0); transform: translateY(0); }
    }

    /* 나머지 텍스트: 조용한 페이드인 */
    @keyframes textReveal {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 구분선: 천천히 늘어나는 */
    @keyframes dividerReveal {
      from { opacity: 0; width: 0; }
      to   { opacity: 0.6; width: 40px; }
    }

    /* ── 회차 리스트 ── */
    main {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 0 100px;
    }

    .list-header {
      padding: 36px 24px 16px;
      display: flex;
      align-items: baseline;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }

    .list-title {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.25em;
      color: var(--text-dim);
    }

    .list-count {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 11px;
      color: var(--accent-dim);
    }

    .episode-list {
      list-style: none;
    }

    .episode-item {
      border-bottom: 1px solid var(--border);
    }

    /* 공개 회차 */
    .episode-item a {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 22px 24px;
      text-decoration: none;
      transition: background 0.15s;
    }

    .episode-item a:hover {
      background: var(--bg2);
    }

    .ep-num {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 11px;
      font-weight: 300;
      color: var(--accent);
      letter-spacing: 0.05em;
      min-width: 52px;
      padding-top: 2px;
      flex-shrink: 0;
    }

    .ep-info { flex: 1; }

    .ep-title {
      font-size: 15px;
      font-weight: 400;
      color: var(--text-bright);
      line-height: 1.5;
      margin-bottom: 5px;
      word-break: keep-all;
    }

    .ep-meta {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 11px;
      font-weight: 300;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    .ep-badge-new {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 9px;
      font-weight: 400;
      color: var(--accent);
      border: 1px solid var(--accent-dim);
      padding: 2px 6px;
      border-radius: 2px;
      letter-spacing: 0.1em;
      flex-shrink: 0;
      margin-top: 3px;
    }

    /* 비공개 회차 */
    .episode-item.locked {
      pointer-events: none;
    }

    .episode-item.locked .ep-locked-row {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 22px 24px;
      opacity: 0.35;
    }

    .ep-lock-icon {
      font-size: 11px;
      color: var(--text-dim);
      min-width: 52px;
      padding-top: 2px;
      flex-shrink: 0;
    }

    .ep-unlock-date {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 10px;
      font-weight: 300;
      color: var(--text-dim);
      margin-top: 4px;
    }

    /* ── 푸터 ── */
    footer {
      text-align: center;
      padding: 40px 24px;
      border-top: 1px solid var(--border);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 11px;
      font-weight: 300;
      color: var(--text-dim);
      letter-spacing: 0.1em;
    }

    /* 페이드인 */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    header { animation: fadeUp 0.7s ease both; }
    .episode-item:nth-child(1)  { animation: fadeUp 0.5s 0.05s ease both; }
    .episode-item:nth-child(2)  { animation: fadeUp 0.5s 0.10s ease both; }
    .episode-item:nth-child(3)  { animation: fadeUp 0.5s 0.15s ease both; }
    .episode-item:nth-child(4)  { animation: fadeUp 0.5s 0.20s ease both; }
    .episode-item:nth-child(5)  { animation: fadeUp 0.5s 0.25s ease both; }
    .episode-item:nth-child(6)  { animation: fadeUp 0.5s 0.30s ease both; }
    .episode-item:nth-child(7)  { animation: fadeUp 0.5s 0.35s ease both; }
    .episode-item:nth-child(8)  { animation: fadeUp 0.5s 0.40s ease both; }
    .episode-item:nth-child(9)  { animation: fadeUp 0.5s 0.45s ease both; }
    .episode-item:nth-child(10) { animation: fadeUp 0.5s 0.50s ease both; }
    .episode-item:nth-child(11) { animation: fadeUp 0.5s 0.55s ease both; }
    .episode-item:nth-child(12) { animation: fadeUp 0.5s 0.60s ease both; }
  </style>
</head>

<script>
// ══════════════════════════════════════════
//  헤더 파티클 — 새벽 먼지 / 별빛
//  아주 작고 희미한 입자들이 천천히 떠오르다
//  가끔 금빛으로 반짝이고 사라지는 효과
// ══════════════════════════════════════════
(function () {
  const canvas = document.getElementById('headerCanvas');
  const header = canvas.parentElement;
  const ctx = canvas.getContext('2d');

  let W, H, particles = [], raf;

  function resize() {
    W = canvas.width  = header.offsetWidth;
    H = canvas.height = header.offsetHeight;
  }

  // 파티클 하나 생성
  function createParticle(forceX) {
    const x = forceX !== undefined ? forceX : Math.random() * W;
    const isGold = Math.random() < 0.18; // 18%는 금빛
    return {
      x,
      y: H + Math.random() * 30,          // 아래에서 시작
      size: Math.random() * 1.4 + 0.3,
      speed: Math.random() * 0.28 + 0.06, // 매우 느리게
      drift: (Math.random() - 0.5) * 0.15, // 좌우 흔들림
      opacity: 0,
      maxOpacity: isGold
        ? Math.random() * 0.45 + 0.1
        : Math.random() * 0.18 + 0.03,
      life: 0,
      lifespan: Math.random() * 320 + 180, // 프레임 수
      isGold,
      phase: Math.random() * Math.PI * 2,  // 깜빡임 위상
      twinkleSpeed: Math.random() * 0.03 + 0.008,
    };
  }

  // 초기 파티클 — 화면 전체에 분산 배치
  function init() {
    particles = [];
    const count = Math.floor((W * H) / 5000);
    for (let i = 0; i < count; i++) {
      const p = createParticle();
      p.y = Math.random() * H;     // 처음엔 랜덤 위치
      p.life = Math.random() * p.lifespan;
      p.opacity = p.maxOpacity * Math.random();
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    const totalNeeded = Math.floor((W * H) / 5000);

    // 파티클 부족하면 새로 추가
    if (particles.length < totalNeeded) {
      particles.push(createParticle());
    }

    particles.forEach((p, i) => {
      p.life++;
      p.x += p.drift;
      p.y -= p.speed;
      p.phase += p.twinkleSpeed;

      const progress = p.life / p.lifespan;

      // 페이드인 → 유지 → 페이드아웃
      let alpha;
      if (progress < 0.2) {
        alpha = (progress / 0.2) * p.maxOpacity;
      } else if (progress < 0.75) {
        alpha = p.maxOpacity;
      } else {
        alpha = ((1 - progress) / 0.25) * p.maxOpacity;
      }

      // 금빛 입자는 추가로 깜빡임
      if (p.isGold) {
        alpha *= 0.7 + 0.3 * Math.sin(p.phase);
      }

      p.opacity = Math.max(0, alpha);

      // 색상
      const color = p.isGold
        ? `rgba(210, 170, 100, ${p.opacity})`
        : `rgba(200, 190, 175, ${p.opacity})`;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = color;

      // 금빛은 아주 은은한 글로우
      if (p.isGold && p.opacity > 0.1) {
        ctx.shadowColor = 'rgba(200,150,70,0.4)';
        ctx.shadowBlur = 4;
      } else {
        ctx.shadowBlur = 0;
      }

      ctx.fill();
      ctx.shadowBlur = 0;

      // 수명 다하거나 화면 밖이면 재생성
      if (p.life >= p.lifespan || p.y < -10 || p.x < -10 || p.x > W + 10) {
        particles[i] = createParticle();
      }
    });

    raf = requestAnimationFrame(draw);
  }

  // 초기화 & 시작
  resize();
  init();
  draw();

  window.addEventListener('resize', () => {
    resize();
    init();
  });
})();
</script>

</body>
</html>
