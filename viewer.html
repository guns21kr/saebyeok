<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>새벽 — 조명건</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e0e;
      --bg2: #161616;
      --border: #2a2a2a;
      --text: #d4cfc8;
      --text-dim: #7a7570;
      --text-bright: #ece8e1;
      --accent: #b8956a;
      --accent-dim: #7a6245;
      --nav-h: 60px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Serif KR', serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── 상단 바 ── */
    .top-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(14,14,14,0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .top-back {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px;
      font-weight: 300;
      color: var(--text-dim);
      text-decoration: none;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .top-back:hover { color: var(--accent); }

    .top-title {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px;
      font-weight: 300;
      color: var(--text-dim);
      letter-spacing: 0.08em;
    }

    /* ── 에피소드 헤더 ── */
    .ep-header {
      padding: 52px 28px 40px;
      max-width: 680px;
      margin: 0 auto;
      border-bottom: 1px solid var(--border);
    }

    .ep-label {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 11px;
      font-weight: 300;
      color: var(--accent-dim);
      letter-spacing: 0.25em;
      margin-bottom: 16px;
    }

    .ep-title-main {
      font-size: clamp(24px, 6vw, 32px);
      font-weight: 400;
      color: var(--text-bright);
      line-height: 1.3;
      margin-bottom: 14px;
      word-break: keep-all;
    }

    .ep-date {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px;
      font-weight: 300;
      color: var(--text-dim);
      letter-spacing: 0.08em;
    }

    /* ── 본문 ── */
    .ep-body {
      max-width: 680px;
      margin: 0 auto;
      padding: 44px 28px 120px;
    }

    .ep-body p {
      font-size: 18px;
      font-weight: 300;
      line-height: 1.85;
      color: var(--text);
      margin-bottom: 1.6em;
      word-break: keep-all;
      letter-spacing: 0.01em;
    }

    /* 대화 들여쓰기 없이, 이탤릭으로 구분 */
    .ep-body p.dialogue {
      font-style: italic;
      color: var(--text-bright);
      padding-left: 1em;
      border-left: 2px solid var(--accent-dim);
    }

    /* 씬 구분선 */
    .ep-body .scene-break {
      text-align: center;
      color: var(--accent-dim);
      margin: 2em 0;
      font-size: 14px;
      letter-spacing: 0.3em;
      opacity: 0.5;
    }

    /* 소제목 */
    .ep-body h3 {
      font-size: 14px;
      font-weight: 400;
      color: var(--text-dim);
      letter-spacing: 0.15em;
      font-family: 'Noto Sans KR', sans-serif;
      margin: 2.5em 0 1.2em;
    }

    /* ── 하단 네비게이션 ── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(14,14,14,0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid var(--border);
      height: var(--nav-h);
      display: flex;
      align-items: stretch;
    }

    .nav-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px;
      font-weight: 300;
      color: var(--text-dim);
      text-decoration: none;
      letter-spacing: 0.08em;
      transition: color 0.15s, background 0.15s;
      cursor: pointer;
      border: none;
      background: none;
    }

    .nav-btn:hover { color: var(--accent); background: var(--bg2); }

    .nav-btn.center {
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      color: var(--text-dim);
    }

    .nav-btn.disabled {
      opacity: 0.2;
      pointer-events: none;
    }

    /* 읽기 진행 바 */
    .progress-bar {
      position: fixed;
      top: 50px;
      left: 0;
      height: 2px;
      background: var(--accent);
      width: 0%;
      transition: width 0.1s linear;
      z-index: 101;
    }

    /* 페이드인 */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .ep-header { animation: fadeIn 0.5s ease both; }
    .ep-body   { animation: fadeIn 0.5s 0.1s ease both; }

    /* 로딩/오류 */
    .not-found {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-dim);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      font-weight: 300;
    }

    .not-found a {
      display: inline-block;
      margin-top: 20px;
      color: var(--accent);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

<div class="top-bar">
  <a class="top-back" href="index.html">← 목록</a>
  <span class="top-title" id="topTitle">새벽</span>
</div>

<div class="progress-bar" id="progressBar"></div>

<div id="content">
  <!-- JS로 렌더링 -->
</div>

<nav class="bottom-nav">
  <a class="nav-btn" id="btnPrev">이전 화</a>
  <a class="nav-btn center" href="index.html">목록으로</a>
  <a class="nav-btn" id="btnNext">다음 화</a>
</nav>

<script>
// ══════════════════════════════════════════════════════
//  회차 순서 정의 (오래된 순 → 최신순, 즉 1-1 이 index 0)
// ══════════════════════════════════════════════════════
const ORDER = [
  '1-1','1-2','1-3','1-4','1-5','1-6','1-7','1-8','1-9',
  '2-1','2-2','2-3','2-4','2-5','2-6','2-7','2-8','2-9','2-10','2-11',
  '3-2','3-3','3-4','3-5','3-6','3-7','3-8','3-9',
  'epilogue1','epilogue2'
];

// ══════════════════════════════════════════════════════
//  전체 회차 데이터
// ══════════════════════════════════════════════════════
const EPISODES = {

  '1-1': {
    num: '1부 1화',
    title: '새벽',
    date: '1945년 8월 15일 · 서울',
    content: `
<p>나는 어둠 속에서 왔다.</p>
<p>따뜻하고 좁고 소리 없던 곳에서, 빛과 소음과 낯선 공기의 세계로. 누군가의 손이 나를 붙잡았다. 거칠고 단단한 손이었다. 나는 그 손이 무엇인지 몰랐다. 다만 그 손이 떨리고 있다는 것만 느꼈다.</p>
<p>울었다.</p>
<p>왜 우는지 몰랐다. 그냥 울어야 할 것 같았다. 폐가 처음으로 공기를 삼켰고, 그 공기 속에는 무언가 타는 냄새가 섞여 있었다. 나중에 알았다. 그건 거리 어딘가에서 피워올린 봉화 연기였다고.</p>
<p>밖에서 사람들이 소리치고 있었다. 처음 듣는 소리였다. 기쁨인지 울음인지 구분할 수 없었다. 어쩌면 그 둘은 처음부터 같은 소리였는지도 모른다.</p>
<p>어머니의 심장 소리가 들렸다. 빠르고 불규칙했다. 나는 그 소리를 이미 알고 있었다. 열 달을 그 소리와 함께 잠들었으니까. 하지만 이날은 달랐다. 뭔가가 그 소리를 흔들고 있었다. 두려움인지, 안도인지, 아니면 아직 이름 붙이지 못한 다른 무엇인지.</p>
<p>누군가 말했다.</p>
<p class="dialogue">「해방이래.」</p>
<p>그 말이 무엇인지 나는 몰랐다. 하지만 그 말을 입에 담은 사람의 목소리가 흔들렸다는 것은 알았다. 기쁨으로 흔들리는 목소리와 두려움으로 흔들리는 목소리는 다르다. 나는 아직 그 차이를 알지 못했다. 그래서 그 목소리가 어느 쪽인지 알 수 없었다.</p>
<p>그것도 나중에 알았다. 그 목소리는 아버지의 것이었다고.</p>
<p>아버지는 그날 딱 한 번 나를 안았다고 했다. 내가 기억하지 못하는 그 잠깐 동안. 그리고 문 밖의 소리를 들으며 서둘러 나를 어머니 품에 돌려놓았다고. 발소리가 계단을 올라오고 있었다. 빠르고 무거운 발소리.</p>
<p>나는 아무것도 몰랐다.</p>
<p>그냥 울었다. 배가 고팠다. 추웠다. 세상이 너무 크고 너무 밝았다.</p>
<p>밖에서는 계속 사람들이 소리쳤다. 해방이라고. 드디어 해방이라고.</p>
<p>나는 그 소리 한가운데서 태어났다.</p>
<p>그리고 아버지는 그 소리 한가운데서 사라졌다.</p>
<div class="scene-break">— — —</div>
<p>새벽에 태어나서 새벽이라는 이름을 얻은 아이는, 세상이 뒤집어지는 소리를 자면서 들었다.</p>
<p>8월 15일의 서울은 8월 14일과 다를 게 없었다. 일본 순사는 여전히 골목을 돌았고, 총독부 깃발은 그대로 걸려 있었고, 사람들은 아직 무릎을 꿇은 채 잠들어 있었다. 우리 동네 사람들이 해방이 됐다는 걸 안 건 그 다음날 아침이었다. 누군가 골목에서 소리를 질렀다. 처음엔 싸움인 줄 알았다고 했다.</p>
<p>어머니는 갓난 나를 안고 문을 열었을 때, 이웃 아주머니가 달려오고 있었다. 맨발에 치마가 흘러내리는 것도 모른 채.</p>
<p class="dialogue">「해방이래. 해방이 됐대.」</p>
<p>어머니는 그 말을 듣고 한참을 서 있었다고 했다. 움직이지도, 울지도, 웃지도 않고. 그냥 나를 꼭 끌어안은 채로.</p>
<p>나는 그때 자고 있었다.</p>
<p>아버지는 그 자리에 없었다.</p>
<p>해방이 됐다는 소리가 골목을 가득 채우던 바로 그 아침에, 아버지는 이미 우리 집에 없었다. 간밤에 왔다가 새벽이 오기 전에 떠났다. 내가 세상에 나온 지 두 시간도 채 되지 않아서.</p>
<p>어머니는 그 이야기를 내게 딱 한 번 했다.</p>
<p>내가 열두 살이 되던 해, 어머니가 아버지 이름을 처음이자 마지막으로 입에 올리던 날 밤.</p>
<p>그 뒤로 어머니는 다시는 그 이름을 말하지 않았다.</p>
    `
  },

  '1-2': {
    num: '1부 2화',
    title: '멀리 간 사람들',
    date: '1948년 가을 · 새벽 네 살',
    content: `
<p>나는 그 아저씨의 이름을 몰랐다.</p>
<p>그냥 옆집 아저씨였다. 우리 골목에는 이름으로 불리는 어른이 없었다. 다들 옆집 아저씨, 앞집 아주머니, 건넛집 할머니였다. 이름은 어른들끼리만 아는 것이었고, 아이들한테는 필요 없는 것이었다.</p>
<p>옆집 아저씨는 키가 컸다. 내가 기억하는 건 그것뿐이다. 세상의 모든 어른은 컸지만, 그 아저씨는 특히 컸다. 골목에서 마주치면 허리를 굽혀 내 눈높이까지 내려왔다. 그러면 얼굴이 보였다. 눈이 길고 가늘었다. 웃을 때 그 눈이 더 가늘어졌다.</p>
<p class="dialogue">「새벽이 왔네.」</p>
<p>항상 그렇게 말했다. 내 이름을 부를 때 목소리가 부드러웠다. 나는 그 아저씨가 좋았다. 이유는 없었다. 그냥 좋았다.</p>
<p>그 아저씨가 없어진 건 가을이 시작될 무렵이었다.</p>
<div class="scene-break">— — —</div>
<p>처음엔 몰랐다.</p>
<p>그냥 며칠 동안 안 보이는 거라고 생각했다. 어른들은 가끔 며칠씩 사라졌다가 돌아왔다. 하지만 옆집 아주머니의 얼굴이 달라졌다.</p>
<p>얼굴이 달라진다는 게 무슨 뜻인지 네 살짜리가 설명할 수 있을 리 없다. 그냥 달라졌다. 전에는 마당에서 빨래를 널 때 콧노래를 흥얼거리던 사람이었다. 그게 사라졌다. 빨랫줄에 옷을 거는 손도 달라졌다.</p>
<p>어머니한테 물었다.</p>
<p class="dialogue">「옆집 아저씨 어디 갔어?」</p>
<p>어머니는 된장국을 젓던 손을 멈췄다. 아주 잠깐이었다.</p>
<p class="dialogue">「멀리 갔어.」</p>
<p class="dialogue">「언제 와?」</p>
<p>이번엔 더 긴 침묵이었다.</p>
<p class="dialogue">「먹어.」</p>
<p>어머니는 국그릇을 내 앞에 놓았다. 나는 더 묻지 않았다. 된장국이 뜨거웠다. 후후 불면서 먹었다.</p>
<div class="scene-break">— — —</div>
<p>그 뒤로 멀리 가는 사람들이 늘었다.</p>
<p>한 명씩이었다. 한꺼번에 여럿이 사라지는 게 아니라, 하나씩, 조용히, 사람들이 눈치채지 못하게. 어느 날 아침에 일어나면 그냥 없었다.</p>
<p>우리 골목은 열두 가구였다. 내가 네 살이던 그 가을부터 이듬해 봄 사이에, 그 열두 가구에서 다섯 명이 멀리 갔다.</p>
<p>어른들이 모이면 목소리가 작아졌다. 아이가 다가오면 말이 끊겼다. 아이들은 그 끊기는 순간을 알았다. 우리가 들으면 안 되는 말들이 있다는 것도 알았다.</p>
<div class="scene-break">— — —</div>
<p>어느 날 밤이었다.</p>
<p>잠들었다고 생각했는데 잠든 게 아니었다. 눈을 감고 누워 있는데 문 밖에서 소리가 들렸다. 발소리였다. 조심스러운 발소리. 우리 집 마루를 지나 부엌 쪽으로 가는 소리.</p>
<p>어머니였다.</p>
<p>부엌에서 작은 소리들이 들렸다. 뭔가를 꺼내는 소리, 싸는 소리, 다시 넣는 소리.</p>
<p>다음 날 아침, 어머니는 아무 일도 없었다는 얼굴이었다.</p>
<p>나중에 알았다. 한참 나중에.</p>
<p>그 시절 우리 집 마루 밑에 뭔가가 있었다고. 어머니는 평생 그게 무엇인지 말하지 않았다. 내가 다 커서 물었을 때도 어머니는 그냥 밥을 차렸다. 먹으라고 했다.</p>
<div class="scene-break">— — —</div>
<p>옆집 아주머니가 우리 집에 온 건 그 가을이 거의 끝나갈 무렵이었다.</p>
<p>손에 뭔가를 들고 있었다. 천으로 싼 것이었다. 크지 않았다. 두 손으로 들 수 있는 크기.</p>
<p>어머니가 그것을 받았다. 아주머니가 가고 나서 어머니는 한참을 마당에 서 있었다. 그 천 보따리를 가슴에 안은 채로.</p>
<p class="dialogue">「엄마, 그거 뭐야?」</p>
<p>어머니가 내려다봤다. 눈빛이 이상했다. 슬픈 것 같기도 하고 무서운 것 같기도 했다. 그 두 가지가 같이 있는 얼굴은 처음 봤다.</p>
<p class="dialogue">「아무것도 아니야.」</p>
<p>그리고 부엌으로 들어갔다.</p>
<p>아무것도 아닌 게 그렇게 조심스럽게 다뤄지는 걸 나는 처음 봤다.</p>
<p>그날 밤 나는 또 잠든 척을 했다.</p>
<p>부엌에서 소리가 났다. 마루 밑에서 나는 소리.</p>
<div class="scene-break">— — —</div>
<p>옆집 아저씨는 돌아오지 않았다.</p>

<p style="text-align:center; font-size: 16px; color: var(--text-dim); letter-spacing: 0.2em; margin-top: 2em;">박새벽은 걸었다.</p>
    `
  },

  'epilogue2': {

    date: '1994–1996 · 새벽 쉰 살',
    content: `
<p>김일성이 죽었다는 뉴스가 나온 건 1994년 여름이었다.</p>
<p>라디오에서 들었다. 혼자 있었다. 딸이 학교 간 오전이었다.</p>
<p>나는 라디오를 봤다. 한참 봤다.</p>
<p>역사가 끝나도 내 아버지는 돌아오지 않는다는 것을 알았다. 사슬이 끊겨도 이미 잘려나간 것들은 다시 붙지 않는다는 것을. 그걸 알면서도 그 잠깐의 가벼움이 있었다.</p>
<p>인정했다. 그것으로 됐다.</p>
<p>딸이 학교에서 돌아왔다. 신발을 벗으면서 말했다.</p>
<p class="dialogue">「엄마, 나쁜 사람이 죽었다고 선생님이 그랬어.」</p>
<p>나는 밥을 차리면서 말했다.</p>
<p class="dialogue">「밥 먹어.」</p>
<p>어머니처럼.</p>
<div class="scene-break">— — —</div>
<p>딸은 열한 살이었다. 눈이 컸다. 웃을 때 한쪽이 더 올라갔다. 처음 봤을 때부터 알았다. 준서를 닮았다는 것을.</p>
<p>준서는 모른다. 딸이 태어난 것을. 1986년 봄이었다. 알리려고 했는데 그해 겨울부터 준서가 달라졌고, 이듬해 봄에 사라졌다. 아이를 안고 명동 거리를 찾아다녔다. 찾지 못했다.</p>
<div class="scene-break">— — —</div>
<p>1995년이 됐다.</p>
<p>4월이었다. 딸이 열두 살이 됐다. 내가 열두 살이던 해에 아버지 칸을 비워두고 과제를 써야 했던 나이.</p>
<p>5월이었다.</p>
<p>백화점이 무너졌다고 했다. 서울 한복판에서. 오백 명이 넘는 사람이 건물 안에 있었다고 했다.</p>
<p>숟가락을 내려놨다.</p>
<p>총이 아니었다. 전쟁이 아니었다. 탱크가 아니었다. 그냥 건물이 무너진 것이었다. 부실하게 지어진 건물이. 그 안에서 사람들이.</p>
<p>죽는 방법이 달라졌다. 그것뿐이었다.</p>
<p>딸이 학교에서 돌아왔다. 얼굴이 이상했다.</p>
<p class="dialogue">「엄마. 백화점이 무너졌대. 거기 사람들이 많이 죽었대.」</p>
<p class="dialogue">「알아.」</p>
<p class="dialogue">「무서워.」</p>
<p>나는 딸을 봤다. 열두 살. 처음으로 세상이 무너질 수 있다는 것을 아는 얼굴이었다.</p>
<p>다가갔다. 옆에 앉았다.</p>
<p class="dialogue">「그래.」</p>
<p class="dialogue">「무서운 거 맞아.」</p>
<p>딸이 나를 봤다.</p>
<p class="dialogue">「엄마도?」</p>
<p class="dialogue">「나도 무서울 때 있었어. 어릴 때.」</p>
<p class="dialogue">「언제.」</p>
<p class="dialogue">「이런저런 때에.」</p>
<p>우리는 나란히 앉아 있었다. 창밖에 봄이 있었다. 건물이 무너진 날에도 봄은 그대로였다. 항상 그랬던 것처럼.</p>
<div class="scene-break">— — —</div>
<p>가을이었다.</p>
<p>뉴스에서 이름이 나왔다. 전두환. 노태우.</p>
<p>구속됐다는 말이었다.</p>
<p>나는 뉴스를 봤다. 오래 봤다.</p>
<p>광주. 1980년 5월. 그 새벽. 골목에 등을 붙이고 앉아 있던 내가. 교복 입은 아이가 쓰러지던 것을 본 내가.</p>
<p>준서가 찾아왔던 것이. 그 사람 등에 얼굴을 묻었던 것이.</p>
<p>그 모든 것의 이름이 지금 법정에 서 있었다.</p>
<p>울지 않았다. 웃지도 않았다.</p>
<p>다만 생각했다. 준서가 이것을 봤다면. 어떤 얼굴을 했을지.</p>
<div class="scene-break">— — —</div>
<p>1996년 봄이었다.</p>
<p>그날 저녁이었다.</p>
<p>밥을 먹고 설거지를 했다. 딸이 옆에서 그릇을 닦았다. 우리는 그것을 같이 했다. 어머니와 내가 그랬던 것처럼.</p>
<p>물소리가 났다.</p>
<p>딸이 말했다. 그릇을 닦으면서. 나를 보지 않고.</p>
<p class="dialogue">「엄마.」</p>
<p class="dialogue">「응.」</p>
<p class="dialogue">「아버지는 어떤 사람이야.」</p>
<p>물소리가 잠깐 멈췄다. 아주 잠깐.</p>
<p>나는 설거지를 계속 했다. 손을 멈추지 않았다. 멈추면 안 될 것 같았다.</p>
<p>딸이 기다렸다.</p>
<p>나는 그릇을 내려놨다. 수건으로 손을 닦았다. 딸을 봤다.</p>
<p>열두 살의 얼굴이었다. 크고 맑은 눈. 한쪽이 더 올라가는 입꼬리. 알아보는 눈빛.</p>
<p>준서였다.</p>
<p>나는 딸의 눈을 봤다. 그 눈 안에서 준서를 봤다. 살아 있었다. 이 얼굴 안에.</p>
<p>나는 말했다.</p>
<p class="dialogue">「아버지는 말이야, 좋은 사람이었어.」</p>
<p>딸이 나를 봤다. 기다렸다.</p>
<p>물소리가 멈춘 부엌이 조용했다.</p>
<p>나는 계속 말했다.</p>
<p>박새벽은 말했다.</p>
<p>처음으로, 끝까지.</p>
<p>창밖에 봄이 있었다.</p>
    `
  }

// ══════════════════════════════════════════════════════
//  URL 파싱 & 렌더링
// ══════════════════════════════════════════════════════
const params = new URLSearchParams(location.search);
const epId = params.get('ep');
const content = document.getElementById('content');
const progressBar = document.getElementById('progressBar');

const idx = ORDER.indexOf(epId);
const ep = EPISODES[epId];

if (!ep) {
  content.innerHTML = `
    <div class="not-found">
      <p>회차를 찾을 수 없습니다.</p>
      <a href="index.html">← 목록으로 돌아가기</a>
    </div>`;
} else {
  // 타이틀 업데이트
  document.title = `${ep.title} — 새벽`;
  document.getElementById('topTitle').textContent = ep.num;

  // 에피소드 렌더링
  content.innerHTML = `
    <div class="ep-header">
      <p class="ep-label">${ep.num}</p>
      <h1 class="ep-title-main">${ep.title}</h1>
      <p class="ep-date">${ep.date}</p>
    </div>
    <div class="ep-body">
      ${ep.content}
    </div>
  `;

  // 이전/다음 버튼
  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');

  if (idx > 0) {
    const prevId = ORDER[idx - 1];
    const prevEp = EPISODES[prevId];
    btnPrev.href = `viewer.html?ep=${prevId}`;
    btnPrev.title = prevEp ? prevEp.title : '';
  } else {
    btnPrev.classList.add('disabled');
    btnPrev.removeAttribute('href');
  }

  if (idx < ORDER.length - 1) {
    const nextId = ORDER[idx + 1];
    const nextEp = EPISODES[nextId];
    btnNext.href = `viewer.html?ep=${nextId}`;
    btnNext.title = nextEp ? nextEp.title : '';
  } else {
    btnNext.classList.add('disabled');
    btnNext.removeAttribute('href');
  }
}

// 스크롤 진행 바
window.addEventListener('scroll', () => {
  const scrollTop = window.scrollY;
  const docHeight = document.documentElement.scrollHeight - window.innerHeight;
  const pct = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
  progressBar.style.width = pct + '%';
});
</script>
